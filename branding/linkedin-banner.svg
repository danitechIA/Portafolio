    <line x1="620" y1="330" x2="730" y2="290"/><line x1="730" y1="290" x2="820" y2="345"/>
    <line x1="1240" y1="80" x2="1330" y2="140"/><line x1="1330" y1="140" x2="1435" y2="90"/>
